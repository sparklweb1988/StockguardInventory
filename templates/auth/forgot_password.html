{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <h3>Forgot Password</h3>
    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" class="form-control mb-3" placeholder="Enter your email" required>
        <button class="btn btn-primary">Send Reset Link</button>
    </form>
</div>
{% endblock %}
