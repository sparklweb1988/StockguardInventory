{% extends "base.html" %}
{% block content %}

<h3>Update Product</h3>

<form method="POST" class="card p-4 shadow-sm">

    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="name" value="{{ product.name }}" class="form-control" required>
    </div>


    <div class="mb-3">
        <label class="form-label">Cost Price</label>
        <input type="number" step="0.01" name="cost_price" value="{{ product.cost_price }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Selling Price</label>
        <input type="number" step="0.01" name="selling_price" value="{{ product.selling_price }}" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-warning">
        Update Product
    </button>
    <a href="{% url 'product_list'%}" class="btn btn-secondary w-100 mt-3">Back to product</a>
</form>

{% endblock %}
